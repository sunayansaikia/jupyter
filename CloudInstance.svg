<svg width="220" height="160" viewBox="0 0 220 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f4f9fe"/>
      <stop offset="100%" stop-color="#b8d6ec"/>
    </linearGradient>

    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dfeaf4"/>
      <stop offset="100%" stop-color="#9fbcd3"/>
    </linearGradient>

    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Cloud -->
  <path d="M60 70 H160 C180 70,190 55,190 40 C190 25,170 15,150 20 
           C145 5,120 0,110 15 C90 5,70 20,65 35 
           C45 30,30 45,30 60 C30 70,45 70,60 70 Z"
        fill="url(#cloudGrad)" stroke="#7fb3d5" stroke-width="1.5"/>

  <!-- Servers -->
  <g filter="url(#shadow)">
    <rect x="60" y="75" width="100" height="18" rx="6" fill="url(#serverGrad)"/>
    <rect x="60" y="97" width="100" height="18" rx="6" fill="url(#serverGrad)"/>
    <rect x="60" y="119" width="100" height="18" rx="6" fill="url(#serverGrad)"/>

    <!-- Indicator lights -->
    <circle cx="75" cy="84" r="2.5" fill="#6fcf97"/>
    <circle cx="85" cy="84" r="2.5" fill="#56ccf2"/>

    <circle cx="75" cy="106" r="2.5" fill="#f2994a"/>
    <circle cx="85" cy="106" r="2.5" fill="#eb5757"/>

    <circle cx="75" cy="128" r="2.5" fill="#6fcf97"/>
    <circle cx="85" cy="128" r="2.5" fill="#56ccf2"/>
  </g>
</svg>
