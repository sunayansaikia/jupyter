<svg width="240" height="170" viewBox="0 0 240 170" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Blue cloud -->
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e3f2fd"/>
      <stop offset="50%" stop-color="#90caf9"/>
      <stop offset="100%" stop-color="#64b5f6"/>
    </linearGradient>

    <!-- Cylinder side -->
    <linearGradient id="cylSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bbdefb"/>
      <stop offset="40%" stop-color="#e3f2fd"/>
      <stop offset="70%" stop-color="#64b5f6"/>
      <stop offset="100%" stop-color="#1e88e5"/>
    </linearGradient>

    <!-- Cylinder top -->
    <linearGradient id="cylTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#90caf9"/>
    </linearGradient>

    <!-- Shadow -->
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Cloud -->
  <g filter="url(#shadow)">
    <path d="
      M65 90
      H175
      C200 90, 215 75, 215 55
      C215 35, 195 25, 175 30
      C170 10, 140 10, 125 25
      C105 10, 75 25, 70 45
      C45 40, 25 55, 25 75
      C25 90, 50 90, 65 90 Z"
      fill="url(#cloudGrad)"
      stroke="#1e88e5"
      stroke-width="1.5"
    />
  </g>

  <!-- Storage Cylinder (clean version) -->
  <g filter="url(#shadow)">
    <!-- Top -->
    <ellipse cx="120" cy="88" rx="42" ry="14" fill="url(#cylTop)"/>

    <!-- Body -->
    <path d="
      M78 88
      Q78 125 78 125
      L162 125
      Q162 125 162 88
      Z"
      fill="url(#cylSide)"
    />

    <!-- Bottom -->
    <ellipse cx="120" cy="125" rx="42" ry="14" fill="url(#cylSide)"/>
  </g>
</svg>
